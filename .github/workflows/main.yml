name: Actualizar Datos
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node scraper.js
      - name: Guardar cambios
        run: |
          git config --global user.name 'Robot'
          git config --global user.email 'robot@github.com'
          git add investigadores.json
          git commit -m "Actualización" || exit 0
          git push

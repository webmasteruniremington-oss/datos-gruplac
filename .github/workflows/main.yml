name: GrupLAC Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    # Añadimos permisos explícitos de escritura para que la Action pueda subir archivos
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install axios cheerio iconv-lite

      - name: Run scraper
        run: node scraper.js

      - name: Guardar cambios automáticamente
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 'git add .' añade TODOS los archivos nuevos y modificados
          git add .
          
          # Hacemos el commit. Si no hay cambios, el 'exit 0' evita que la Action marque error.
          git commit -m "Actualización automática de grupos de investigación" || exit 0
          
          # Subimos los cambios al repositorio
          git push origin main

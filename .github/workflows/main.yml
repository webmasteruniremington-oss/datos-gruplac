name: GrupLAC Scraper

on:
  workflow_dispatch: # Ejecución manual
  schedule:
    - cron: '0 0 * * 1' # Cada lunes a las 12 AM

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install # ESTO ES VITAL para que funcione iconv-lite y axios

      - name: Run scraper
        run: node scraper.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add investigadores.json
          git commit -m "Actualización automática de investigadores" || exit 0
          git push

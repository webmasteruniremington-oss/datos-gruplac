name: GrupLAC Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1' # Se ejecuta todos los lunes a medianoche

jobs:
  build:
    runs-on: ubuntu-latest
    # Aumentamos el tiempo máximo de espera del job a 15 minutos 
    # para dar margen a los reintentos del scraper
    timeout-minutes: 15 
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install axios cheerio iconv-lite

      - name: Run scraper
        # Añadimos una variable de entorno para que Axios maneje mejor las peticiones en CI
        run: node scraper.js
        env:
          NODE_ENV: production

      - name: Guardar cambios automáticamente
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Añadimos solo los archivos JSON generados para evitar basura en el commit
          git add *.json
          
          # Verificamos si hay cambios reales antes de hacer el commit
          if git diff --cached --quiet; then
            echo "No hay cambios en los integrantes actuales. Saltando commit."
            exit 0
          fi
          
          git commit -m "Actualización automática de grupos de investigación: $(date +'%Y-%m-%d')"
          
          # Usamos un pull antes del push por si acaso hubo un cambio manual en el repo
          git pull --rebase origin main
          git push origin main

name: GrupLAC Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1' # Todos los lunes a las 00:00

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Evita que se corte por las pausas de seguridad
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install axios cheerio iconv-lite

      - name: Run scraper
        run: node scraper.js

      - name: Guardar cambios automáticamente
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add *.json
          
          # Solo hace commit si hay cambios reales en los archivos JSON
          if git diff --cached --quiet; then
            echo "Sin cambios detectados. Finalizando."
            exit 0
          fi
          
          git commit -m "Actualización automática integrantes actuales: $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
